name: Daily Contribution Bot

on:
  schedule:
    # This runs at 00:00 UTC every day. 
    # Use https://crontab.guru to customize the timing.
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  make-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make a change
        run: |
          echo "Last heart-beat: $(date)" > heartbeat.txt

      - name: Commit and Push
        run: |
          git config --local user.email "your-github-email@example.com"
          git config --local user.name "Your Name"
          git add heartbeat.txt
          git commit -m "chore: daily heartbeat $(date)"
          git push
